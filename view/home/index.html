    <script>
        if (localStorage.getItem('techintegrity_access') === null) {
            window.location.href = '/';
        }
    </script>
    <style>
        * {
            box-sizing: border-box;
        }
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }

        ::-webkit-scrollbar-thumb {
            background: #3c4043;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #1a73e8;
        }

        * {
            scrollbar-width: thin;
            scrollbar-color: #aaaaaa #eeeeee;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Roboto', sans-serif;
            overflow-x: hidden;
        }

        .hero-section {
            width: 100%;
            height: 100vh;
            background-color: #ffffff;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hero-section img {
            max-width: 90%;
            max-height: 80%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .scroll-down-arrow {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            z-index: 10;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translate(-50%, 0);}
            40% {transform: translate(-50%, -10px);}
            60% {transform: translate(-50%, -5px);}
        }

        .main-content {
            background-color: #ffffff;
            width: 100%;
            padding: 20px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-divider {
            width: 100%;
            max-width: 850px;
            height: 1px;
            background-color: #e0e0e0;
            margin: 15px 0;
        }

        .nav-button {
            width: 100%;
            max-width: 320px;
            background-color: #292929;
            color: #ffffff;
            text-decoration: none;
            text-align: center;
            padding: 16px 0;
            margin: 5px 0;
            font-size: 15px;
            font-weight: 500;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .nav-button:hover {
            background-color: #3d3d3d;
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div class="hero-section">
        <img src="https://database.techintegrity.hu/images/main-banner.png" alt="Banner">
        <div class="scroll-down-arrow" onclick="document.getElementById('content').scrollIntoView({behavior: 'smooth'});">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#34A9DF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>
        </div>
    </div>
    <main class="main-content" id="content">
        <div class="section-divider"></div>
        <a href="info-page1/" class="nav-button">Hírek és információk</a>
        
        <div class="section-divider"></div>
        <a href="posts/" class="nav-button">Közzétett információk</a>

        <div class="section-divider"></div>
        <a href="campaign/" class="nav-button">Kampányunk (INTEGRÁLT Hang)</a>
        
        <div class="section-divider"></div>
        <a href="store/" class="nav-button">Üzletünk</a>
        
        <div class="section-divider"></div>
        <a href="papers/" class="nav-button">Hivatalos jogirataink</a>
        
        <div class="section-divider"></div>
        <a href="contact/" class="nav-button">Kapcsolat, elérhetőség</a>
        
        <div class="section-divider"></div>
        <a href="https://portal.techintegrity.hu" class="nav-button">Bejelentkezési portál</a>
        
        <div class="section-divider"></div>
    </main>

    <div id="footer-container"></div>

    <script>
        fetch('https://database.techintegrity.hu/static/html/footer.html') // FOOTER FETCH
            .then(response => response.text())
            .then(data => {
            document.getElementById('footer-container').innerHTML = data;
        });
    </script>
    <script>
        fetch('https://database.techintegrity.hu/static/html/main-menu.html') // MAIN MENU FETCH
            .then(response => response.text())
            .then(data => {
            document.getElementById('site-header').innerHTML = data;
        });
    </script>
</body>
</html>
